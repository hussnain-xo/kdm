<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      margin: 0;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    
    .header h3 {
      margin: 0;
      color: #7cc8ff;
      font-size: 14px;
    }
    
    .logo {
      width: 24px;
      height: 24px;
      margin-right: 10px;
      background: #2563EB;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
    }
    
    .toggle-container {
      background: #222;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    
    .toggle-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #555;
      transition: .4s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #2563EB;
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    
    .status {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
    }
    
    .status.on {
      color: #10B981;
    }
    
    .status.off {
      color: #EF4444;
    }
    
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .btn {
      background: #333;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #444;
    }
    
    .btn.primary {
      background: #2563EB;
    }
    
    .btn.primary:hover {
      background: #1D4ED8;
    }
    
    .btn.success {
      background: #10B981;
    }
    
    .btn.success:hover {
      background: #0DA271;
    }
    
    .quick-url {
      background: #222;
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
    }
    
    .quick-url h4 {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #ccc;
    }
    
    .url-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #111;
      color: white;
      font-size: 12px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    
    .footer {
      font-size: 11px;
      color: #777;
      text-align: center;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }
    
    .connection-status {
      display: flex;
      align-items: center;
      margin-top: 5px;
    }
    
    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    
    .connection-dot.connected {
      background: #10B981;
      box-shadow: 0 0 5px #10B981;
    }
    
    .connection-dot.disconnected {
      background: #EF4444;
      box-shadow: 0 0 5px #EF4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">K</div>
    <h3>Kalupura Download Manager</h3>
  </div>
  
  <div class="toggle-container">
    <div class="toggle-label">
      <span>Download Interceptor</span>
      <label class="switch">
        <input type="checkbox" id="toggleInterceptor">
        <span class="slider"></span>
      </label>
    </div>
    <div id="statusText" class="status">Interceptor: ON</div>
    
    <div class="connection-status">
      <div id="connectionDot" class="connection-dot"></div>
      <span id="connectionText">Checking connection...</span>
    </div>
  </div>
  
  <div class="actions">
    <button id="currentPageBtn" class="btn primary">Current Page</button>
    <button id="scanPageBtn" class="btn">Scan Page</button>
    <button id="downloadsBtn" class="btn">Open KDM</button>
    <button id="settingsBtn" class="btn">Settings</button>
  </div>
  
  <div class="quick-url">
    <h4>Quick Download</h4>
    <input type="text" id="urlInput" class="url-input" placeholder="Paste URL here">
    <button id="quickDownloadBtn" class="btn success" style="width: 100%;">Download</button>
  </div>
  
  <div class="footer">
    KDM v1.4.0 | Port: 9669
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
