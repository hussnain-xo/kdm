# Build KDM releases: portable folders + installers (Inno Setup EXE, macOS .pkg, Linux .deb).
# Artifacts: DMG/ZIP, tar.gz, Windows zip + Setup EXE, optional .pkg / .deb
name: Package KDM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux-x86_64
          - os: windows-latest
            label: Windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements-build.txt

      # Do NOT run "playwright install chromium" before PyInstaller — it can pull ~100MB+ into
      # the frozen app on Windows and push dist/release/*.zip or *.exe over GitHub's ~100MB
      # per-artifact-file limit. Users run: playwright install chromium (see USER_QUICK_START).

      - name: Install Playwright system deps (Linux)
        if: runner.os == 'Linux'
        run: python -m playwright install-deps chromium

      - name: PyInstaller (Windows / Linux)
        if: runner.os != 'macOS'
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: python -m PyInstaller packaging/kdm.spec --noconfirm --clean

      - name: PyInstaller (macOS — universal2 if possible)
        if: runner.os == 'macOS'
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          python -m PyInstaller packaging/kdm.spec --noconfirm --clean --target-arch universal2 || {
            echo "Universal2 build failed (Python/deps); falling back to single-arch for this runner."
            python -m PyInstaller packaging/kdm.spec --noconfirm --clean
          }

      - name: Remove Playwright browser folders from dist (size / GitHub 100MB per file)
        run: |
          python -c "
          import pathlib, shutil
          root = pathlib.Path('dist')
          if not root.exists():
              raise SystemExit(0)
          for p in sorted(root.rglob('*'), key=lambda x: len(x.parts), reverse=True):
              if not p.is_dir():
                  continue
              n = p.name
              if n.startswith('chromium-') or n.startswith('chromium_headless_shell-') or n.startswith('ffmpeg-') or n.startswith('webkit-'):
                  shutil.rmtree(p, ignore_errors=True)
                  print('removed', p)
          "

      - name: Ad-hoc sign KDM.app (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --sign - --deep dist/KDM.app

      - name: Prepare README
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d ' \t\r\n' < packaging/VERSION)
          mkdir -p dist/release
          sed "s/__VERSION__/${VERSION}/g" packaging/INSTALL.template.txt > dist/release/KDM-${VERSION}-README.txt
          sed "s/__VERSION__/${VERSION}/g" packaging/USER_QUICK_START.txt > dist/release/USER_QUICK_START.txt

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          VERSION=$(tr -d ' \t\r\n' < packaging/VERSION)
          test -d dist/KDM.app
          STAGE=dist/dmg_staging
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R dist/KDM.app "$STAGE/KDM.app"
          cp dist/release/KDM-${VERSION}-README.txt "$STAGE/README-KDM.txt"
          cp dist/release/USER_QUICK_START.txt "$STAGE/USER_QUICK_START.txt"
          cp packaging/MAC_FIRST_LAUNCH.txt "$STAGE/MAC_FIRST_LAUNCH.txt"
          ln -sf /Applications "$STAGE/Applications"
          hdiutil create -volname "Kalupura Download Manager" -srcfolder "$STAGE" -ov -format UDZO "dist/release/KDM-${VERSION}-macOS.dmg"
          ditto -c -k --sequesterRsrc --keepParent "$STAGE" "dist/release/KDM-${VERSION}-macOS.zip"
          rm -rf "$STAGE"

      - name: macOS PKG installer
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          chmod +x scripts/build_macos_pkg.sh packaging/mac_pkg_scripts/postinstall
          ./scripts/build_macos_pkg.sh

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          VERSION=$(tr -d ' \t\r\n' < packaging/VERSION)
          test -d dist/KDM
          cp dist/release/KDM-${VERSION}-README.txt dist/KDM/README-KDM.txt
          cp dist/release/USER_QUICK_START.txt dist/KDM/USER_QUICK_START.txt
          tar -czvf "dist/release/KDM-${VERSION}-Linux-x86_64.tar.gz" -C dist KDM
          chmod +x scripts/build_linux_deb.sh
          ./scripts/build_linux_deb.sh

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $v = (Get-Content packaging/VERSION -Raw).Trim()
          if (-not (Test-Path "dist\KDM\KDM.exe")) { throw "KDM.exe missing" }
          Copy-Item "dist\release\KDM-$v-README.txt" "dist\KDM\README-KDM.txt" -Force
          Copy-Item "dist\release\USER_QUICK_START.txt" "dist\KDM\USER_QUICK_START.txt" -Force
          Compress-Archive -Path "dist\KDM" -DestinationPath "dist\release\KDM-$v-Windows-x64.zip" -Force

      - name: Windows Inno Setup (Programs & Features)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
            "C:\Program Files\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "ISCC not on disk; running choco (ignore non-zero if already installed)..."
            cmd /c "choco install innosetup -y --no-progress 2>nul"
            $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $iscc) { throw "ISCC.exe not found. Install Inno Setup 6." }
          $v = (Get-Content packaging/VERSION -Raw).Trim()
          Write-Host "--- KDM-Setup.iss (first 24 lines) ---"
          Get-Content packaging\windows\KDM-Setup.iss -TotalCount 24
          Write-Host "--- compiling with /DMyAppVersion=$v ---"
          & $iscc "/DMyAppVersion=$v" packaging\windows\KDM-Setup.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed with exit code $LASTEXITCODE" }

      - name: Windows MSI (WiX — Welcome / license / install dir)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\build_windows_msi.ps1

      - uses: actions/upload-artifact@v5
        with:
          name: KDM-${{ matrix.label }}
          path: dist/release/*
